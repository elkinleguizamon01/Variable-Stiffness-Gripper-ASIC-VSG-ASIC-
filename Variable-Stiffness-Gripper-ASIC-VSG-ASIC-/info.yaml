# Tiny Tapeout project information
project:
  title:        "Variable-Stiffness Gripper ASIC"
  author:       "Your Name"           # Update with your name
  discord:      ""                     # Optional: Your discord username
  description:  "Digital control system for a 2-joint robotic arm with servo-driven gripper"
  language:     "Verilog"
  clock_hz:     50000000              # 50 MHz clock

  # How many tiles your design occupies? A single tile is about 167x108 uM.
  tiles: "1x1"          # Valid values: 1x1, 1x2, 2x2, 3x2, 4x2, 6x2 or 8x2

  # Your top module name must start with "tt_um_". Make it unique by including your github username:
  top_module:  "tt_um_brazo_digital"

  # List your project's source files here.
  # Source files must be in ./src and you must list each source file separately, one per line.
  # Don't forget to also update `PROJECT_SOURCES` in test/Makefile.
  source_files:
    - "project.v"
    - "tt_um_brazo_digital.v"
    - "brazo_digital_top.v"
    - "debouncer.v"
    - "nema_controller.v"
    - "gripper_stepper_controller.v"

# The pinout of your project. Leave unused pins blank. DO NOT delete or add any pins.
# This section is for the datasheet/website. Use descriptive names (e.g., RX, TX, MOSI, SCL, SEG_A, etc.).
pinout:
  # Inputs
  ui[0]: "Btn X CW"
  ui[1]: "Btn X CCW"
  ui[2]: "Btn Y CW"
  ui[3]: "Btn Y CCW"
  ui[4]: "DIP Grip"
  ui[5]: "SW Limit"
  ui[6]: ""
  ui[7]: ""

  # Outputs
  uo[0]: "Step X"
  uo[1]: "Dir X"
  uo[2]: "Step Y"
  uo[3]: "Dir Y"
  uo[4]: "Step Grip"
  uo[5]: "Dir Grip"
  uo[6]: ""
  uo[7]: ""

  # Bidirectional pins (not used in this design)
  uio[0]: ""
  uio[1]: ""
  uio[2]: ""
  uio[3]: ""
  uio[4]: ""
  uio[5]: ""
  uio[6]: ""
  uio[7]: ""

# Do not change!
yaml_version: 6
